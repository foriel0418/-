<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一造学习计划 - 云同步打卡系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #718096;
            font-size: 14px;
        }
        
        .exam-date {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 12px;
        }
        
        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 12px 16px;
            background: #f0fdf4;
            border-radius: 10px;
            border: 1px solid #86efac;
        }
        
        .sync-status.offline {
            background: #fef3c7;
            border-color: #fcd34d;
        }
        
        .sync-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        .sync-status.offline .sync-dot {
            background: #f59e0b;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .sync-text {
            font-size: 13px;
            color: #166534;
        }
        
        .sync-status.offline .sync-text {
            color: #92400e;
        }
        
        .user-info {
            margin-left: auto;
            font-size: 13px;
            color: #6b7280;
        }
        
        .stats-bar {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px;
            background: #f7fafc;
            border-radius: 12px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-number.hours {
            color: #38a169;
        }
        
        .stat-label {
            font-size: 13px;
            color: #718096;
            margin-top: 4px;
        }
        
        .progress-bar {
            grid-column: 1 / -1;
            background: #e2e8f0;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .filter-bar {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .tasks-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .stage-section {
            margin-bottom: 24px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .stage-section:last-child {
            margin-bottom: 0;
        }
        
        .stage-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .stage-header:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .stage-基础阶段 { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
        .stage-强化阶段 { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
        .stage-冲刺阶段 { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); }
        .stage-考前阶段 { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); }
        
        .stage-title {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stage-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .stage-progress {
            font-size: 14px;
            color: #718096;
            background: white;
            padding: 6px 14px;
            border-radius: 20px;
        }
        
        .stage-hours {
            font-size: 14px;
            color: #38a169;
            background: #c6f6d5;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .stage-content {
            padding: 20px;
            background: white;
            display: none;
        }
        
        .stage-content.show {
            display: block;
        }
        
        .week-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #e2e8f0;
        }
        
        .week-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .week-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 10px 14px;
            background: #f7fafc;
            border-radius: 10px;
        }
        
        .week-header:hover {
            background: #edf2f7;
        }
        
        .week-title {
            font-size: 15px;
            font-weight: bold;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .week-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .week-progress {
            font-size: 13px;
            color: #718096;
        }
        
        .week-hours {
            font-size: 13px;
            color: #38a169;
            font-weight: bold;
        }
        
        .task-list {
            display: none;
            padding-left: 8px;
        }
        
        .task-list.show {
            display: block;
        }
        
        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 14px;
            margin-bottom: 6px;
            background: #f7fafc;
            border-radius: 10px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .task-item:hover {
            background: #edf2f7;
        }
        
        .task-item.completed {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-color: #667eea;
        }
        
        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .task-checkbox:hover {
            border-color: #667eea;
        }
        
        .task-checkbox.checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }
        
        .task-checkbox.checked::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-name {
            font-size: 14px;
            color: #2d3748;
            margin-bottom: 4px;
        }
        
        .task-item.completed .task-name {
            text-decoration: line-through;
            color: #a0aec0;
        }
        
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .task-subject {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .subject-造价管理 { background: #e3f2fd; color: #1976d2; }
        .subject-工程计价 { background: #fff3e0; color: #f57c00; }
        .subject-工程计量 { background: #e8f5e9; color: #388e3c; }
        .subject-案例分析 { background: #fce4ec; color: #c2185b; }
        .subject-复习巩固 { background: #f3e5f5; color: #7b1fa2; }
        .subject-模拟考试 { background: #e0f7fa; color: #00838f; }
        .subject-真题训练 { background: #fff8e1; color: #ffa000; }
        .subject-考前准备 { background: #efebe9; color: #5d4037; }
        .subject-考前冲刺 { background: #e8eaf6; color: #3f51b5; }
        .subject-考试 { background: #ffcdd2; color: #c62828; }
        
        .task-date {
            font-size: 11px;
            color: #718096;
        }
        
        .task-hours {
            display: inline-block;
            padding: 2px 8px;
            background: #c6f6d5;
            color: #276749;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .action-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-left: auto;
        }
        
        .action-btn:hover {
            opacity: 0.9;
        }
        
        .export-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .week-section.hidden,
        .task-item.hidden {
            display: none;
        }
        
        .exam-day {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%) !important;
            border: 2px solid #e53935 !important;
        }
        
        .exam-day .task-name {
            color: #c62828;
            font-weight: bold;
        }
        
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .login-modal.show {
            display: flex;
        }
        
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-box h2 {
            margin-bottom: 20px;
            color: #2d3748;
        }
        
        .login-box p {
            color: #718096;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .login-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .login-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .login-btn:hover {
            opacity: 0.9;
        }
        
        .skip-btn {
            background: #f7fafc;
            color: #718096;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            header, .stats-bar, .filter-bar, .tasks-container {
                border-radius: 12px;
                padding: 16px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .stat-number {
                font-size: 24px;
            }
            
            .filter-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .stage-info {
                flex-direction: column;
                align-items: flex-end;
                gap: 6px;
            }
        }
    </style>
</head>

        let currentFilter = 'all';
        
        // ==================== 云存储API ====================
        
        function getStorageKey(userId) {
            return CLOUD_CONFIG.syncKeyPrefix + userId;
        }
        
        async function saveToCloud(data) {
            if (!currentUserId) return;
            const cloudData = {
                userId: currentUserId,
                data: data,
                lastUpdate: new Date().toISOString()
            };
            localStorage.setItem(getStorageKey(currentUserId), JSON.stringify(cloudData));
            updateSyncStatus(true);
        }
        
        async function loadFromCloud() {
            if (!currentUserId) return {};
            const stored = localStorage.getItem(getStorageKey(currentUserId));
            if (stored) {
                const cloudData = JSON.parse(stored);
                updateSyncStatus(true);
                return cloudData.data || {};
            }
            updateSyncStatus(false);
            return {};
        }
        
        function updateSyncStatus(isOnline) {
            const statusEl = document.getElementById('syncStatus');
            const userInfoEl = document.getElementById('userInfo');
            if (isOnline && currentUserId) {
                statusEl.classList.remove('offline');
                statusEl.querySelector('.sync-text').textContent = '云同步已启用';
                userInfoEl.textContent = `用户: ${currentUserId}`;
            } else if (currentUserId) {
                statusEl.classList.add('offline');
                statusEl.querySelector('.sync-text').textContent = '离线模式';
                userInfoEl.textContent = `用户: ${currentUserId}`;
            } else {
                statusEl.classList.add('offline');
                statusEl.querySelector('.sync-text').textContent = '本地存储模式';
                userInfoEl.textContent = '';
            }
        }
        
        // ==================== 用户管理 ====================
        
        function checkUserId() {
            currentUserId = localStorage.getItem('yizao_user_id');
            if (!currentUserId) {
                document.getElementById('loginModal').classList.add('show');
            } else {
                updateSyncStatus(true);
                loadAndInit();
            }
        }
        
        function saveUserId() {
            const userId = document.getElementById('userIdInput').value.trim();
            if (!userId) {
                alert('请输入用户ID');
                return;
            }
            currentUserId = userId;
            localStorage.setItem('yizao_user_id', userId);
            document.getElementById('loginModal').classList.remove('show');
            updateSyncStatus(true);
            loadAndInit();
        }
        
        function skipLogin() {
            currentUserId = null;
            document.getElementById('loginModal').classList.remove('show');
            updateSyncStatus(false);
            loadAndInit();
        }
        
        // ==================== 数据管理 ====================
        
        async function loadCheckData() {
            if (currentUserId) {
                return await loadFromCloud();
            }
            const data = localStorage.getItem('yizaoStudyPlan_local');
            return data ? JSON.parse(data) : {};
        }
        
        async function saveCheckData(data) {
            if (currentUserId) {
                await saveToCloud(data);
            } else {
                localStorage.setItem('yizaoStudyPlan_local', JSON.stringify(data));
            }
        }
        
        async function toggleCheck(taskId) {
            const data = await loadCheckData();
            data[taskId] = !data[taskId];
            await saveCheckData(data);
            updateUI();
        }
        
        // ==================== UI渲染 ====================
        
        async function updateUI() {
            const data = await loadCheckData();
            let totalTasks = 0;
            let completedTasks = 0;
            let totalHours = 0;
            let completedHours = 0;
            
            document.querySelectorAll('.task-item').forEach(item => {
                const taskId = item.dataset.taskId;
                const hours = parseFloat(item.dataset.hours) || 0;
                const stage = item.dataset.stage;
                const isCompleted = data[taskId];
                
                let shouldShow = true;
                if (currentFilter === 'completed') {
                    shouldShow = isCompleted;
                } else if (currentFilter === 'pending') {
                    shouldShow = !isCompleted;
                } else if (currentFilter !== 'all' && currentFilter !== stage) {
                    shouldShow = false;
                }
                
                if (shouldShow) {
                    item.classList.remove('hidden');
                    totalTasks++;
                    totalHours += hours;
                    if (isCompleted) {
                        completedTasks++;
                        completedHours += hours;
                    }
                } else {
                    item.classList.add('hidden');
                }
                
                if (isCompleted) {
                    item.classList.add('completed');
                    item.querySelector('.task-checkbox').classList.add('checked');
                } else {
                    item.classList.remove('completed');
                    item.querySelector('.task-checkbox').classList.remove('checked');
                }
            });
            
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = completedTasks;
            document.getElementById('remainingTasks').textContent = totalTasks - completedTasks;
            document.getElementById('totalHours').textContent = totalHours.toFixed(1) + 'h';
            document.getElementById('completedHours').textContent = completedHours.toFixed(1) + 'h';
            document.getElementById('remainingHours').textContent = (totalHours - completedHours).toFixed(1) + 'h';
            
            const rate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            document.getElementById('completionRate').textContent = rate + '%';
            document.getElementById('progressFill').style.width = rate + '%';
            document.getElementById('progressFill').textContent = rate + '%';
            
            updateWeekProgress(data);
            updateStageProgress(data);
        }
        
        function updateWeekProgress(data) {
            document.querySelectorAll('.week-section').forEach(section => {
                const visibleTasks = section.querySelectorAll('.task-item:not(.hidden)');
                const allTasks = section.querySelectorAll('.task-item');
                const completedTasks = section.querySelectorAll('.task-item.completed');
                
                let weekTotalHours = 0;
                let weekCompletedHours = 0;
                allTasks.forEach(task => {
                    const hours = parseFloat(task.dataset.hours) || 0;
                    weekTotalHours += hours;
                    if (data[task.dataset.taskId]) {
                        weekCompletedHours += hours;
                    }
                });
                
                section.querySelector('.week-progress').textContent = 
                    completedTasks.length + '/' + allTasks.length;
                section.querySelector('.week-hours').textContent = 
                    weekCompletedHours.toFixed(1) + '/' + weekTotalHours.toFixed(1) + 'h';
                
                if (visibleTasks.length === 0) {
                    section.classList.add('hidden');
                } else {
                    section.classList.remove('hidden');
                }
            });
        }
        
        function updateStageProgress(data) {
            document.querySelectorAll('.stage-section').forEach(section => {
                const visibleWeeks = section.querySelectorAll('.week-section:not(.hidden)');
                const allTasks = section.querySelectorAll('.task-item');
                const completedTasks = section.querySelectorAll('.task-item.completed');
                
                let stageTotalHours = 0;
                let stageCompletedHours = 0;
                allTasks.forEach(task => {
                    const hours = parseFloat(task.dataset.hours) || 0;
                    stageTotalHours += hours;
                    if (data[task.dataset.taskId]) {
                        stageCompletedHours += hours;
                    }
                });
                
                section.querySelector('.stage-progress').textContent = 
                    '完成: ' + completedTasks.length + '/' + allTasks.length;
                section.querySelector('.stage-hours').textContent = 
                    stageCompletedHours.toFixed(1) + '/' + stageTotalHours.toFixed(1) + 'h';
                
                section.style.display = visibleWeeks.length === 0 ? 'none' : 'block';
            });
        }
        
        function generateTasks() {
            const container = document.getElementById('tasksContainer');
            const stages = ['基础阶段', '强化阶段', '冲刺阶段', '考前阶段'];
            let taskId = 0;
            
            stages.forEach(stage => {
                const stageSection = document.createElement('div');
                stageSection.className = 'stage-section';
                stageSection.dataset.stage = stage;
                
                const weeksInStage = studyPlan.filter(w => w.stage === stage);
                
                stageSection.innerHTML = `
                    <div class="stage-header stage-${stage}" onclick="toggleStage(this)">
                        <div class="stage-title">
                            <span class="arrow">▼</span>
                            ${stage} (${weeksInStage.length}周)
                        </div>
                        <div class="stage-info">
                            <div class="stage-progress">完成: 0/0</div>
                            <div class="stage-hours">0/0h</div>
                        </div>
                    </div>
                    <div class="stage-content show">
                        ${weeksInStage.map(weekData => {
                            return `
                                <div class="week-section" data-week="${weekData.week}">
                                    <div class="week-header" onclick="toggleWeek(this)">
                                        <div class="week-title">
                                            <span class="arrow">▶</span>
                                            第${weekData.week}周
                                        </div>
                                        <div class="week-info">
                                            <div class="week-progress">0/0</div>
                                            <div class="week-hours">0/0h</div>
                                        </div>
                                    </div>
                                    <div class="task-list">
                                        ${weekData.tasks.map(task => {
                                            const currentTaskId = 'task_' + taskId++;
                                            return `
                                                <div class="task-item" data-task-id="${currentTaskId}" data-stage="${stage}" data-hours="${task.hours || 0}">
                                                    <div class="task-checkbox" onclick="toggleCheck('${currentTaskId}')"></div>
                                                    <div class="task-content">
                                                        <div class="task-name">${task.name}</div>
                                                        <div class="task-meta">
                                                            <span class="task-subject subject-${task.subject}">${task.subject}</span>
                                                            <span class="task-date">${task.date} ${task.weekday}</span>
                                                            ${task.hours > 0 ? '<span class="task-hours">' + task.hours + 'h</span>' : ''}
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(stageSection);
            });
        }
        
        function toggleStage(header) {
            const content = header.nextElementSibling;
            const arrow = header.querySelector('.arrow');
            content.classList.toggle('show');
            arrow.textContent = content.classList.contains('show') ? '▼' : '▶';
        }
        
        function toggleWeek(header) {
            const taskList = header.nextElementSibling;
            const arrow = header.querySelector('.arrow');
            taskList.classList.toggle('show');
            arrow.textContent = taskList.classList.contains('show') ? '▼' : '▶';
        }
        
        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    currentFilter = this.dataset.filter;
                    
                    document.querySelectorAll('.stage-content').forEach(content => content.classList.add('show'));
                    document.querySelectorAll('.stage-section .arrow').forEach(arrow => arrow.textContent = '▼');
                    document.querySelectorAll('.task-list').forEach(list => list.classList.add('show'));
                    document.querySelectorAll('.week-section .arrow').forEach(arrow => arrow.textContent = '▼');
                    
                    updateUI();
                });
            });
        }
        
        async function exportData() {
            const data = await loadCheckData();
            const exportObj = {
                exportDate: new Date().toLocaleString('zh-CN'),
                userId: currentUserId || 'local',
                tasks: []
            };
            
            let taskId = 0;
            studyPlan.forEach(weekData => {
                weekData.tasks.forEach(task => {
                    const currentTaskId = 'task_' + taskId++;
                    exportObj.tasks.push({
                        week: weekData.week,
                        stage: weekData.stage,
                        date: task.date,
                        subject: task.subject,
                        name: task.name,
                        hours: task.hours,
                        completed: data[currentTaskId] || false
                    });
                });
            });
            
            const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '一造学习计划打卡记录_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        async function clearAllData() {
            if (confirm('确定要清除所有打卡数据吗？此操作不可恢复！')) {
                if (currentUserId) {
                    localStorage.removeItem(getStorageKey(currentUserId));
                }
                localStorage.removeItem('yizaoStudyPlan_local');
                currentFilter = 'all';
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
                await updateUI();
            }
        }
        
        async function loadAndInit() {
            generateTasks();
            setupFilters();
            await updateUI();
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            checkUserId();
        });
    </script>
